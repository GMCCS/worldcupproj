<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P'ra Cima Deles, C******! | World Cup 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="trophy">🏆</div>
      <h1>P'ra Cima Deles, C******!</h1>
      <p class="subtitle" style="font-size: 0.9rem; margin-top: 0.5rem; color: var(--accent-gold);">
        🕐 All times in Lisbon Time (WEST)
      </p>
    </header>

    <!-- Portugal Hero -->
    <div class="portugal-hero" id="portugalHero">
      <div class="hero-label">🇵🇹 Your Team's Next Match</div>
      <div class="hero-match">
        <div class="hero-team">
          <span class="hero-flag">🇵🇹</span>
          <span class="hero-team-name">Portugal</span>
        </div>
        <span class="hero-vs">VS</span>
        <div class="hero-team">
          <span class="hero-flag">🇨🇩</span>
          <span class="hero-team-name">Congo DR</span>
        </div>
      </div>
      <div class="hero-info">Group K · Jun 18, 00:00 Lisbon · MetLife Stadium, New York</div>
      <div class="hero-countdown" id="heroCountdown">
        <div class="countdown-unit"><span class="countdown-value" id="countDays">--</span><span class="countdown-label">Days</span></div>
        <span class="countdown-sep">:</span>
        <div class="countdown-unit"><span class="countdown-value" id="countHours">--</span><span class="countdown-label">Hours</span></div>
        <span class="countdown-sep">:</span>
        <div class="countdown-unit"><span class="countdown-value" id="countMins">--</span><span class="countdown-label">Mins</span></div>
        <span class="countdown-sep">:</span>
        <div class="countdown-unit"><span class="countdown-value" id="countSecs">--</span><span class="countdown-label">Secs</span></div>
      </div>
    </div>

    <nav class="nav-tabs">
      <button class="tab-btn active" data-tab="schedule">📅 Schedule</button>
      <button class="tab-btn" data-tab="live">🔴 Live Matches</button>
      <button class="tab-btn" data-tab="groups">🌍 Groups</button>
      <button class="tab-btn" data-tab="standings">📊 Standings</button>
      <button class="tab-btn" data-tab="bracket">🏆 Bracket</button>
    </nav>

    <!-- Filters -->
    <div class="filters-container" id="filtersContainer">
      <div class="active-filters" id="activeFilters" style="display: none; margin-bottom: 1rem; padding: 0.75rem 1rem; background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px;">
        <div style="font-size: 0.85rem; color: var(--accent-gold); margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Active Filters:</div>
        <div id="filterBadges" style="display: flex; gap: 0.75rem; flex-wrap: wrap;"></div>
      </div>

      <div class="filter-dropdown">
        <button class="filter-toggle portugal-only-btn" id="portugalOnlyBtn" aria-pressed="false">
          🇵🇹 Portugal
        </button>
      </div>

      <div class="filter-dropdown">
        <button class="filter-toggle portugal-only-btn" id="myTeamsBtn" aria-pressed="false">
          ⭐ Following
        </button>
      </div>

      <div class="filter-dropdown">
        <button class="filter-toggle" id="groupToggle" aria-haspopup="listbox" aria-expanded="false" aria-controls="groupMenu">
          <span>📊 Group</span>
          <span class="dropdown-arrow">▼</span>
        </button>
        <div class="dropdown-menu" id="groupMenu">
          <button class="dropdown-item active" data-filter="all">All Groups</button>
          <button class="dropdown-item" data-filter="A">Group A</button>
          <button class="dropdown-item" data-filter="B">Group B</button>
          <button class="dropdown-item" data-filter="C">Group C</button>
          <button class="dropdown-item" data-filter="D">Group D</button>
          <button class="dropdown-item" data-filter="E">Group E</button>
          <button class="dropdown-item" data-filter="F">Group F</button>
          <button class="dropdown-item" data-filter="G">Group G</button>
          <button class="dropdown-item" data-filter="H">Group H</button>
          <button class="dropdown-item" data-filter="I">Group I</button>
          <button class="dropdown-item" data-filter="J">Group J</button>
          <button class="dropdown-item" data-filter="K">Group K 🇵🇹 (Portugal)</button>
          <button class="dropdown-item" data-filter="L">Group L</button>
        </div>
      </div>

      <div class="filter-dropdown">
        <button class="filter-toggle" id="dateToggle" aria-haspopup="listbox" aria-expanded="false" aria-controls="dateMenu">
          <span>📅 Date</span>
          <span class="dropdown-arrow">▼</span>
        </button>
        <div class="dropdown-menu" id="dateMenu">
          <button class="dropdown-item active" data-filter-date="all">All Dates</button>
          <button class="dropdown-item" data-filter-date="2026-06-11">Jun 11</button>
          <button class="dropdown-item" data-filter-date="2026-06-12">Jun 12</button>
          <button class="dropdown-item" data-filter-date="2026-06-13">Jun 13</button>
          <button class="dropdown-item" data-filter-date="2026-06-14">Jun 14</button>
          <button class="dropdown-item" data-filter-date="2026-06-15">Jun 15</button>
          <button class="dropdown-item" data-filter-date="2026-06-16">Jun 16</button>
          <button class="dropdown-item" data-filter-date="2026-06-17">Jun 17 🇵🇹</button>
          <button class="dropdown-item" data-filter-date="2026-06-18">Jun 18</button>
          <button class="dropdown-item" data-filter-date="2026-06-19">Jun 19</button>
          <button class="dropdown-item" data-filter-date="2026-06-20">Jun 20</button>
          <button class="dropdown-item" data-filter-date="2026-06-21">Jun 21</button>
          <button class="dropdown-item" data-filter-date="2026-06-22">Jun 22</button>
          <button class="dropdown-item" data-filter-date="2026-06-23">Jun 23 🇵🇹</button>
          <button class="dropdown-item" data-filter-date="2026-06-24">Jun 24</button>
          <button class="dropdown-item" data-filter-date="2026-06-25">Jun 25</button>
          <button class="dropdown-item" data-filter-date="2026-06-26">Jun 26</button>
          <button class="dropdown-item" data-filter-date="2026-06-27">Jun 27</button>
          <button class="dropdown-item" data-filter-date="2026-06-28">Jun 28</button>
          <button class="dropdown-item" data-filter-date="2026-06-29">Jun 29 🇵🇹</button>
        </div>
      </div>

      <div class="filter-dropdown">
        <button class="filter-toggle" id="countryToggle" aria-haspopup="listbox" aria-expanded="false" aria-controls="countryMenu">
          <span>🌍 Country</span>
          <span class="dropdown-arrow">▼</span>
        </button>
        <div class="dropdown-menu" id="countryMenu">
          <button class="dropdown-item active" data-filter-country="all">All Countries</button>
          <button class="dropdown-item" data-filter-country="POR">🇵🇹 Portugal</button>
          <!-- Group A -->
          <button class="dropdown-item" data-filter-country="MEX">🇲🇽 Mexico</button>
          <button class="dropdown-item" data-filter-country="RSA">🇿🇦 South Africa</button>
          <button class="dropdown-item" data-filter-country="KOR">🇰🇷 South Korea</button>
          <button class="dropdown-item" data-filter-country="CZE">🇨🇿 Czechia</button>
          <!-- Group B -->
          <button class="dropdown-item" data-filter-country="CAN">🇨🇦 Canada</button>
          <button class="dropdown-item" data-filter-country="BIH">🇧🇦 Bosnia & Herz.</button>
          <button class="dropdown-item" data-filter-country="QAT">🇶🇦 Qatar</button>
          <button class="dropdown-item" data-filter-country="SUI">🇨🇭 Switzerland</button>
          <!-- Group C -->
          <button class="dropdown-item" data-filter-country="BRA">🇧🇷 Brazil</button>
          <button class="dropdown-item" data-filter-country="MAR">🇲🇦 Morocco</button>
          <button class="dropdown-item" data-filter-country="HTI">🇭🇹 Haiti</button>
          <button class="dropdown-item" data-filter-country="SCO">🏴󠁧󠁢󠁳󠁣󠁴󠁿 Scotland</button>
          <!-- Group D -->
          <button class="dropdown-item" data-filter-country="US">🇺🇸 USA</button>
          <button class="dropdown-item" data-filter-country="PAR">🇵🇾 Paraguay</button>
          <button class="dropdown-item" data-filter-country="AUS">🇦🇺 Australia</button>
          <button class="dropdown-item" data-filter-country="TUR">🇹🇷 Türkiye</button>
          <!-- Group E -->
          <button class="dropdown-item" data-filter-country="GER">🇩🇪 Germany</button>
          <button class="dropdown-item" data-filter-country="CUW">🇨🇼 Curaçao</button>
          <button class="dropdown-item" data-filter-country="CIV">🇨🇮 Côte d'Ivoire</button>
          <button class="dropdown-item" data-filter-country="ECU">🇪🇨 Ecuador</button>
          <!-- Group F -->
          <button class="dropdown-item" data-filter-country="NED">🇳🇱 Netherlands</button>
          <button class="dropdown-item" data-filter-country="JPN">🇯🇵 Japan</button>
          <button class="dropdown-item" data-filter-country="SWE">🇸🇪 Sweden</button>
          <button class="dropdown-item" data-filter-country="TUN">🇹🇳 Tunisia</button>
          <!-- Group G -->
          <button class="dropdown-item" data-filter-country="BEL">🇧🇪 Belgium</button>
          <button class="dropdown-item" data-filter-country="EGY">🇪🇬 Egypt</button>
          <button class="dropdown-item" data-filter-country="IRN">🇮🇷 IR Iran</button>
          <button class="dropdown-item" data-filter-country="NZL">🇳🇿 New Zealand</button>
          <!-- Group H -->
          <button class="dropdown-item" data-filter-country="ESP">🇪🇸 Spain</button>
          <button class="dropdown-item" data-filter-country="CPV">🇨🇻 Cabo Verde</button>
          <button class="dropdown-item" data-filter-country="KSA">🇸🇦 Saudi Arabia</button>
          <button class="dropdown-item" data-filter-country="URU">🇺🇾 Uruguay</button>
          <!-- Group I -->
          <button class="dropdown-item" data-filter-country="FRA">🇫🇷 France</button>
          <button class="dropdown-item" data-filter-country="SEN">🇸🇳 Senegal</button>
          <button class="dropdown-item" data-filter-country="IRQ">🇮🇶 Iraq</button>
          <button class="dropdown-item" data-filter-country="NOR">🇳🇴 Norway</button>
          <!-- Group J -->
          <button class="dropdown-item" data-filter-country="ARG">🇦🇷 Argentina</button>
          <button class="dropdown-item" data-filter-country="ALG">🇩🇿 Algeria</button>
          <button class="dropdown-item" data-filter-country="AUT">🇦🇹 Austria</button>
          <button class="dropdown-item" data-filter-country="JOR">🇯🇴 Jordan</button>
          <!-- Group K -->
          <button class="dropdown-item" data-filter-country="COD">🇨🇩 Congo DR</button>
          <button class="dropdown-item" data-filter-country="UZB">🇺🇿 Uzbekistan</button>
          <button class="dropdown-item" data-filter-country="COL">🇨🇴 Colombia</button>
          <!-- Group L -->
          <button class="dropdown-item" data-filter-country="ENG">🏴󠁧󠁢󠁥󠁮󠁧󠁿 England</button>
          <button class="dropdown-item" data-filter-country="CRO">🇭🇷 Croatia</button>
          <button class="dropdown-item" data-filter-country="GHA">🇬🇭 Ghana</button>
          <button class="dropdown-item" data-filter-country="PAN">🇵🇦 Panama</button>
        </div>
      </div>
    </div>

    <div id="schedule" class="tab-content active">
      <div class="matches-grid" id="scheduleMatches">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading World Cup matches...</p>
        </div>
      </div>
    </div>

    <div id="live" class="tab-content">
      <div class="matches-grid" id="liveMatches">
        <div class="loading">
          <div class="spinner"></div>
          <p>Checking for live matches...</p>
        </div>
      </div>
    </div>

    <div id="groups" class="tab-content">
      <div class="groups-container" id="groupsContainer"></div>
    </div>

    <div id="standings" class="tab-content">
      <div id="standingsContainer"></div>
    </div>

    <div id="bracket" class="tab-content">
      <div id="bracketContainer"></div>
    </div>
  </div>

  <!-- Country/Match Modal -->
  <div id="countryModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()" aria-label="Close">×</button>
      <div id="countryDetails"></div>
    </div>
  </div>

  <div id="mobileOverlay" class="mobile-overlay"></div>
  <script src="script.js"></script>
</body>
</html>
