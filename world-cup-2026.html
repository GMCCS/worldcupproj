<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Cima Deles, Caralho! | World Cup 2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&display=swap');

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #141824;
      --bg-card: #1a1f2e;
      --accent-gold: #d4af37;
      --accent-green: #00ff88;
      --accent-red: #ff3366;
      --text-primary: #ffffff;
      --text-secondary: #a0a8b8;
      --border: rgba(255, 255, 255, 0.1);
      --glow: rgba(212, 175, 55, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 255, 136, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 4rem;
      padding: 3rem 0 2rem;
      border-bottom: 2px solid var(--border);
      position: relative;
    }

    .trophy {
      font-size: 4.5rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--accent-gold) 0%, #ffd700 50%, var(--accent-gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      text-shadow: 0 0 30px var(--glow);
      animation: slideDown 0.8s ease-out;
      line-height: 1.1;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Navigation */
    .nav-tabs {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: var(--bg-card);
      border: 2px solid var(--border);
      color: var(--text-secondary);
      padding: 0.8rem 2rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .tab-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .tab-btn:hover::before {
      left: 100%;
    }

    .tab-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      transform: translateY(-2px);
    }

    .tab-btn.active {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
      color: var(--bg-primary);
      box-shadow: 0 0 20px var(--glow);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Match Cards */
    .matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .match-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .match-card.portugal-match {
      border: 2px solid var(--accent-gold);
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.08) 0%, var(--bg-card) 100%);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
    }

    .match-card.portugal-match::before {
      transform: scaleX(1);
    }

    .match-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-gold), var(--accent-green));
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .match-card:hover::before {
      transform: scaleX(1);
    }

    .match-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent-gold);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .match-status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-live {
      background: var(--accent-red);
      color: white;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-live::before {
      content: '●';
      font-size: 0.5rem;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    .status-upcoming {
      background: rgba(0, 255, 136, 0.15);
      color: var(--accent-green);
      border: 1px solid rgba(0, 255, 136, 0.3);
    }

    .status-finished {
      background: rgba(160, 168, 184, 0.15);
      color: var(--text-secondary);
      border: 1px solid rgba(160, 168, 184, 0.3);
    }

    .match-group {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* Compact horizontal team layout */
    .match-teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      min-width: 0;
    }

    .team-right {
      flex-direction: row-reverse;
      text-align: right;
    }

    .team-flag {
      font-size: 2rem;
      filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.3));
      line-height: 1;
      flex-shrink: 0;
    }

    .team-info {
      min-width: 0;
      flex: 1;
    }

    .team-name {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.01em;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-rank {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .match-center {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      min-width: 70px;
    }

    .score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--accent-gold);
      line-height: 1;
      min-width: 30px;
      text-align: center;
      text-shadow: 0 2px 6px rgba(212, 175, 55, 0.3);
    }

    .match-vs {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .match-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .match-time {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
    }

    .match-time-icon {
      color: var(--accent-gold);
      font-size: 0.85rem;
    }

    .match-venue {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Country Details Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      z-index: 1000;
      padding: 2rem;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease-out;
    }

    .modal-content {
      background: var(--bg-card);
      border: 2px solid var(--accent-gold);
      border-radius: 16px;
      max-width: 1000px;
      width: 100%;
      padding: 2.5rem;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.3s ease-out;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--accent-red);
      transform: rotate(90deg);
    }

    .country-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .country-flag-large {
      font-size: 5rem;
      margin-bottom: 1rem;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }

    .country-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
    }

    .fact-section {
      margin-bottom: 1.5rem;
    }

    .fact-title {
      font-size: 0.9rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .fact-value {
      font-size: 1.1rem;
      color: var(--text-primary);
      line-height: 1.6;
    }

    .fun-facts {
      background: rgba(212, 175, 55, 0.1);
      border-left: 3px solid var(--accent-gold);
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1.5rem;
    }

    .fun-facts ul {
      list-style: none;
      margin-top: 0.5rem;
    }

    .fun-facts li {
      padding: 0.5rem 0;
      padding-left: 1.5rem;
      position: relative;
    }

    .fun-facts li::before {
      content: '⚽';
      position: absolute;
      left: 0;
    }

    /* Groups */
    .groups-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    .group-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      transition: all 0.3s ease;
    }

    .group-card:hover {
      border-color: var(--accent-gold);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .group-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--accent-gold);
      margin-bottom: 1.5rem;
      text-align: center;
      letter-spacing: 0.05em;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }

    .team-list {
      list-style: none;
    }

    .team-item {
      display: grid;
      grid-template-columns: 30px 2rem 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      margin-bottom: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .team-item:hover {
      background: rgba(212, 175, 55, 0.1);
      transform: translateX(8px);
      border-left: 3px solid var(--accent-gold);
    }

    .team-rank {
      font-weight: 700;
      color: var(--accent-gold);
      font-size: 1rem;
      text-align: center;
    }

    .team-flag-small {
      font-size: 1.8rem;
      line-height: 1;
    }

    .team-stats {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 600;
      text-align: right;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .matches-grid {
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 3rem;
      }

      .trophy {
        font-size: 3rem;
      }

      header {
        margin-bottom: 2rem;
        padding: 2rem 0 1.5rem;
      }

      .container {
        padding: 1rem;
      }

      .matches-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .match-card {
        padding: 1rem 1.25rem;
      }

      .team-name {
        font-size: 0.95rem;
      }

      .team-flag {
        font-size: 1.8rem;
      }

      .score {
        font-size: 1.8rem;
      }

      .groups-container {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .group-card {
        padding: 1.5rem;
      }

      .modal-content {
        padding: 1.5rem;
        margin: 1rem;
      }

      /* Stack teams vertically in modal on mobile */
      .modal-content > div > div[style*="grid-template-columns"] {
        grid-template-columns: 1fr !important;
        gap: 1.5rem !important;
      }

      .nav-tabs {
        gap: 0.5rem;
      }

      .tab-btn {
        padding: 0.7rem 1.2rem;
        font-size: 0.85rem;
      }

      .team-item {
        grid-template-columns: 25px 1.5rem 1fr auto;
        gap: 0.75rem;
        padding: 0.75rem;
      }

      .team-flag-small {
        font-size: 1.5rem;
      }

      .match-info {
        font-size: 0.8rem;
      }

      .match-venue {
        font-size: 0.75rem;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2.2rem;
        letter-spacing: 0.02em;
      }

      .trophy {
        font-size: 2.5rem;
      }

      .subtitle {
        font-size: 0.9rem;
      }

      .match-card {
        padding: 0.9rem 1rem;
      }

      .team-flag {
        font-size: 1.5rem;
      }

      .team-name {
        font-size: 0.85rem;
      }

      .team-rank {
        font-size: 0.7rem;
      }

      .score {
        font-size: 1.6rem;
      }

      .match-vs {
        font-size: 0.8rem;
      }

      .tab-btn {
        padding: 0.6rem 1rem;
        font-size: 0.8rem;
      }

      .group-title {
        font-size: 2rem;
      }

      .match-info {
        font-size: 0.75rem;
        gap: 0.5rem;
      }

      .match-venue span:last-child {
        max-width: 120px;
      }
    }

    @media (max-width: 360px) {
      .container {
        padding: 0.75rem;
      }

      h1 {
        font-size: 1.8rem;
      }

      .match-card {
        padding: 0.8rem;
      }

      .team-flag {
        font-size: 1.3rem;
      }

      .team-name {
        font-size: 0.8rem;
      }

      .score {
        font-size: 1.4rem;
      }

      .match-info {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.4rem;
      }
    }

    /* Loading Animation */
    .loading {
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
      color: var(--text-secondary);
    }

    .spinner {
      display: inline-block;
      width: 50px;
      height: 50px;
      border: 4px solid rgba(212, 175, 55, 0.2);
      border-top: 4px solid var(--accent-gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="trophy">🏆</div>
      <h1>Para Cima Deles, Caralho!</h1>
      <p class="subtitle" style="font-size: 0.9rem; margin-top: 0.5rem; color: var(--accent-gold);">
        🕐 All times in Lisbon Time (WEST)
      </p>
    </header>

    <nav class="nav-tabs">
      <button class="tab-btn active" data-tab="schedule">📅 Schedule</button>
      <button class="tab-btn" data-tab="live">🔴 Live Matches</button>
      <button class="tab-btn" data-tab="groups">🌍 Groups</button>
      <button class="tab-btn" data-tab="standings">📊 Standings</button>
    </nav>

    <div id="schedule" class="tab-content active">
      <div class="matches-grid" id="scheduleMatches">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading World Cup matches...</p>
        </div>
      </div>
    </div>

    <div id="live" class="tab-content">
      <div class="matches-grid" id="liveMatches">
        <div class="loading">
          <div class="spinner"></div>
          <p>Checking for live matches...</p>
        </div>
      </div>
    </div>

    <div id="groups" class="tab-content">
      <div class="groups-container" id="groupsContainer"></div>
    </div>

    <div id="standings" class="tab-content">
      <div class="groups-container" id="standingsContainer"></div>
    </div>
  </div>

  <!-- Country Modal -->
  <div id="countryModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>

    </div>
  </div>

    // Render matches

      const container = document.getElementById(containerId);
      let matches = worldCupData.matches;
      
      if (filter === 'live') {
        matches = matches.filter(m => m.status === 'live');
      }
      
      // Sort: Portugal matches first, then by date
      matches.sort((a, b) => {
        const aHasPortugal = a.home === 'POR' || a.away === 'POR';
        const bHasPortugal = b.home === 'POR' || b.away === 'POR';
        
        if (aHasPortugal && !bHasPortugal) return -1;
        if (!aHasPortugal && bHasPortugal) return 1;
        
        return new Date(a.date) - new Date(b.date);
      });
      
      if (matches.length === 0) {
        container.innerHTML = '<div class="loading"><p>No matches to display</p></div>';
        return;
      }
      
      container.innerHTML = matches.map(match => {
        const homeTeam = findTeam(match.home);
        const awayTeam = findTeam(match.away);
        const lisbonTime = convertToLisbonTime(match);
        const isPortugalMatch = match.home === 'POR' || match.away === 'POR';
        
        return `
          <div class="match-card ${isPortugalMatch ? 'portugal-match' : ''}" onclick="showMatchDetails('${match.home}', '${match.away}')">

      for (const teams of Object.values(worldCupData.groups)) {

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Convert match time to Lisbon timezone
    function convertToLisbonTime(match) {
      const { date, time, timezone } = match;
      
      // Create date in the match's local timezone
      const dateTimeStr = `${date}T${time}:00`;
      
      // Timezone offset mapping for June 2026 (DST in effect)
      const timezoneOffsets = {
        'America/Mexico_City': -5,   // CDT
        'America/Los_Angeles': -7,   // PDT
        'America/New_York': -4,      // EDT
        'America/Chicago': -5,       // CDT
        'America/Toronto': -4,       // EDT
        'America/Vancouver': -7,     // PDT
        'America/Monterrey': -5,     // CDT
        'Europe/Lisbon': +1          // WEST (Western European Summer Time)
      };
      
      const matchOffset = timezoneOffsets[timezone] || 0;
      const lisbonOffset = timezoneOffsets['Europe/Lisbon'];
      const hoursDifference = lisbonOffset - matchOffset;
      
      // Parse the original time
      const [hours, minutes] = time.split(':').map(Number);
      const matchDate = new Date(date);
      matchDate.setHours(hours + hoursDifference);
      matchDate.setMinutes(minutes);
      
      // Format for Lisbon
      const lisbonHours = matchDate.getHours().toString().padStart(2, '0');
      const lisbonMinutes = matchDate.getMinutes().toString().padStart(2, '0');
      const lisbonDate = matchDate.toLocaleDateString('pt-PT', { 
        weekday: 'short', 
        month: 'short', 
        day: 'numeric' 
      });
      
      return {
        time: `${lisbonHours}:${lisbonMinutes}`,
        date: lisbonDate,
        fullDateTime: matchDate
      };
    }
